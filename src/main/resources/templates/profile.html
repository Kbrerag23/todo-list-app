<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mi Perfil | ToDo Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light pb-5">

<nav class="navbar navbar-expand-lg bg-white shadow-sm mb-5 py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" th:href="@{/tasks}" style="color: #6366f1;">
            <i class="bi bi-arrow-left-circle-fill me-2"></i> Volver a Tareas
        </a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="d-flex align-items-center mb-4">
                <i class="bi bi-person-bounding-box fs-1 me-3" style="color: #a855f7;"></i>
                <div>
                    <h2 class="fw-bold mb-0 text-dark">Gestión de Perfil</h2>
                    <p class="text-muted mb-0">Actualiza tus datos y tu seguridad</p>
                </div>
            </div>

            <div th:if="${param.success}" class="alert alert-success shadow-sm" th:text="${param.success}"></div>
            <div th:if="${param.error}" class="alert alert-danger shadow-sm" th:text="${param.error}"></div>

            <div class="card shadow-sm border-0 mb-4 rounded-4">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                    <h5 class="fw-bold text-dark"><i class="bi bi-person me-2 text-primary"></i> Información Pública</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/profile/update-username}" method="post">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Correo Electrónico (No se puede cambiar)</label>
                            <input type="text" class="form-control-modern w-100 bg-light text-muted" th:value="${user.email}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Nombre de Usuario</label>
                            <input type="text" name="username" class="form-control-modern w-100 bg-white" th:value="${user.username}" required>
                        </div>
                        <div class="text-end">
                            <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold">Guardar Cambios</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm border-0 mb-4 rounded-4">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                    <h5 class="fw-bold text-dark"><i class="bi bi-shield-lock me-2 text-success"></i> Seguridad</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/profile/change-password}" method="post">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Contraseña Actual</label>
                            <input type="password" name="oldPassword" class="form-control-modern w-100 bg-white" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Nueva Contraseña</label>
                            <input type="password" name="newPassword" class="form-control-modern w-100 bg-white" minlength="6" required>
                        </div>
                        <div class="text-end">
                            <button type="submit" class="btn btn-success rounded-pill px-4 fw-bold">Actualizar Contraseña</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm border-danger mb-4 rounded-4" style="border-width: 2px;">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                    <h5 class="fw-bold text-danger"><i class="bi bi-exclamation-triangle me-2"></i> Zona de Peligro</h5>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted small">
                        Una vez que elimines tu cuenta, no hay vuelta atrás. Todas tus tareas y datos serán borrados permanentemente de nuestros servidores.
                    </p>
                    <form th:action="@{/profile/delete-account}" method="post" onsubmit="return confirm('¿Estás COMPLETAMENTE SEGURO de que deseas borrar tu cuenta? Esta acción es irreversible.');">
                        <button type="submit" class="btn btn-outline-danger w-100 rounded-pill fw-bold">Eliminar Mi Cuenta Definitivamente</button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    if(localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }
</script>
</body>
</html>
