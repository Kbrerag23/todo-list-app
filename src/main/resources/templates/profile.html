<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Configuración | ToDo Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div id="globalLoader" class="loader-overlay">
    <div class="spinner"></div>
</div>

<nav class="navbar navbar-expand-lg py-3 sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/tasks}">
            <i class="bi bi-arrow-left text-muted"></i> Ajustes de Cuenta
        </a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-3 mb-4">
            <div class="list-group list-group-flush shadow-sm rounded-3 border">
                <a href="#general" class="list-group-item list-group-item-action py-3 fw-medium active">
                    <i class="bi bi-person me-2"></i> Perfil General
                </a>
                <a href="#security" class="list-group-item list-group-item-action py-3 fw-medium">
                    <i class="bi bi-shield-lock me-2"></i> Seguridad
                </a>
                <a href="#danger" class="list-group-item list-group-item-action py-3 fw-medium text-danger">
                    <i class="bi bi-exclamation-triangle me-2"></i> Zona de Peligro
                </a>
            </div>
        </div>

        <div class="col-lg-7">

            <div th:if="${param.success}" class="alert alert-success border-0 shadow-sm mb-4" th:text="${param.success}"></div>
            <div th:if="${param.error}" class="alert alert-danger border-0 shadow-sm mb-4" th:text="${param.error}"></div>

            <section id="general" class="mb-5">
                <h5 class="fw-bold mb-3">Información del Perfil</h5>
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <form th:action="@{/profile/update-username}" method="post">
                            <div class="mb-4">
                                <label class="form-label text-muted small text-uppercase fw-bold">Email</label>
                                <input type="text" class="form-control-modern w-100 opacity-75" th:value="${user.email}" disabled>
                                <div class="form-text small">El correo electrónico no se puede modificar.</div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small text-uppercase fw-bold">Nombre de usuario</label>
                                <input type="text" name="username" class="form-control-modern w-100" th:value="${user.username}" required>
                            </div>
                            <button type="submit" class="btn btn-vibrant px-4">Actualizar perfil</button>
                        </form>
                    </div>
                </div>
            </section>

            <section id="security" class="mb-5">
                <h5 class="fw-bold mb-3">Seguridad y Acceso</h5>
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <form th:action="@{/profile/change-password}" method="post">
                            <div class="mb-4">
                                <label class="form-label text-muted small text-uppercase fw-bold">Contraseña actual</label>
                                <input type="password" name="oldPassword" class="form-control-modern w-100" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small text-uppercase fw-bold">Nueva contraseña</label>
                                <input type="password" name="newPassword" class="form-control-modern w-100" minlength="6" required>
                            </div>
                            <button type="submit" class="btn btn-dark rounded-3 px-4">Cambiar contraseña</button>
                        </form>
                    </div>
                </div>
            </section>

            <section id="danger" class="mb-5 pb-5">
                <h5 class="fw-bold text-danger mb-3">Eliminar Cuenta</h5>
                <div class="card border-danger bg-light">
                    <div class="card-body p-4">
                        <p class="small text-muted mb-4">
                            Si eliminas tu cuenta, se borrarán de forma permanente todas tus tareas y datos asociados. Esta acción no se puede deshacer.
                        </p>
                        <form th:action="@{/profile/delete-account}" method="post" onsubmit="return confirm('¿Confirmas la eliminación total de tu cuenta?');">
                            <button type="submit" class="btn btn-outline-danger btn-sm fw-bold">Borrar cuenta permanentemente</button>
                        </form>
                    </div>
                </div>
            </section>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
</script>

<script>
    window.addEventListener('beforeunload', () => {
        document.getElementById('globalLoader').classList.add('active');
    });
</script>
</body>
</html>
