<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña | ToDo Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-vibrant d-flex align-items-center min-vh-100 py-5">

<div id="globalLoader" class="loader-overlay">
    <div class="spinner"></div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
            <div class="card card-auth p-4 p-sm-5 shadow-lg">

                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark">Nueva Contraseña</h3>
                    <p class="text-muted small">Por favor, elige una contraseña segura</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger py-2 small text-center" th:text="${param.error}"></div>

                <form th:action="@{/reset-password}" method="post" id="resetForm">
                    <input type="hidden" name="token" th:value="${token}">

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Tu nueva contraseña</label>
                        <input type="password" id="password" name="password" class="form-control-modern w-100 bg-white" required placeholder="Mínimo 6 caracteres" minlength="6">
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">Confirmar contraseña</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control-modern w-100 bg-white" required placeholder="Repite la contraseña">
                        <div id="passwordError" class="text-danger small mt-1 d-none">Las contraseñas no coinciden.</div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-vibrant w-100 mb-3">Guardar y Entrar</button>
                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const submitBtn = document.getElementById("submitBtn");
    const passwordError = document.getElementById("passwordError");

    function validatePasswords() {
        if (confirmPassword.value === "") {
            passwordError.classList.add("d-none");
            submitBtn.disabled = false;
            return;
        }

        if (password.value !== confirmPassword.value) {
            passwordError.classList.remove("d-none");
            submitBtn.disabled = true;
        } else {
            passwordError.classList.add("d-none");
            submitBtn.disabled = false;
        }
    }

    password.addEventListener("input", validatePasswords);
    confirmPassword.addEventListener("input", validatePasswords);
</script>

<script>
    window.addEventListener('beforeunload', () => {
        document.getElementById('globalLoader').classList.add('active');
    });
</script>
</body>
</html>
