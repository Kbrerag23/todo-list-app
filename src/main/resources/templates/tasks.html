<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mis Tareas | ToDo Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .task-done .task-title { text-decoration: line-through; color: #94a3b8; }
        .task-done .task-desc { text-decoration: line-through; opacity: 0.7; }
        .task-date { font-size: 0.75rem; color: #94a3b8; }
        .overdue-task { border-left: 5px solid #dc3545 !important; }
        .soon-task { border-left: 5px solid #ffc107 !important; }
    </style>
</head>
<body class="bg-light pb-5">

<nav class="navbar navbar-expand-lg bg-white shadow-sm mb-5 py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/" style="color: #6366f1;">
            <i class="bi bi-check2-square"></i> ToDo Pro
        </a>
        <div class="d-flex align-items-center">

            <button id="themeToggle" class="btn btn-outline-secondary btn-sm rounded-circle me-3" title="Cambiar Tema">
                <i class="bi bi-moon-stars-fill"></i>
            </button>

            <div class="dropdown">
                <button class="btn btn-light dropdown-toggle rounded-pill fw-medium" type="button" data-bs-toggle="dropdown" style="border: 1px solid #e2e8f0;">
                    <i class="bi bi-person-circle" style="color: #a855f7;"></i>
                    <span th:text="${user.username}">Usuario</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                    <li><a class="dropdown-item py-2" th:href="@{/profile}"><i class="bi bi-person-badge text-primary me-2"></i> Mi Perfil</a></li>
                    <li><a class="dropdown-item py-2" th:href="@{/tasks/export}"><i class="bi bi-file-earmark-spreadsheet text-success me-2"></i> Exportar (CSV)</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <button type="submit" class="dropdown-item text-danger py-2 fw-bold"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-9">

            <div th:if="${user != null and user.role == 'ADMIN'}" class="alert alert-warning border-warning shadow-sm d-flex justify-content-between align-items-center mb-4" style="border-radius: 15px;">
                <div>
                    <i class="bi bi-shield-lock-fill fs-5 me-2 text-dark"></i>
                    <strong class="text-dark">Modo Administrador</strong>
                </div>
                <a th:href="@{/admin/users}" class="btn btn-dark btn-sm fw-bold rounded-pill px-4">Ir al Panel</a>
            </div>

            <div class="card card-auth mb-4 p-2 shadow-sm border-0">
                <div class="card-body">
                    <form th:action="@{/tasks}" th:object="${newTask}" method="post" class="row g-2 align-items-center">
                        <div class="col-md-4">
                            <input type="text" th:field="*{title}" class="form-control-modern w-100 bg-white" placeholder="¿Qué harás hoy?" required>
                        </div>
                        <div class="col-md-3">
                            <select th:field="*{category}" class="form-control-modern w-100 bg-white text-muted">
                                <option value="">Sin etiqueta</option>
                                <option value="Trabajo">💼 Trabajo</option>
                                <option value="Clase">🎓 Clase</option>
                                <option value="Ocio">🎮 Ocio</option>
                                <option value="Hogar">🏠 Hogar</option>
                                <option value="Importante">🔥 Importante</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <input type="date" th:field="*{dueDate}" class="form-control-modern w-100 bg-white text-muted" title="Fecha límite">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-vibrant w-100 h-100">Añadir</button>
                        </div>
                    </form>
                </div>
            </div>

            <form method="get" action="/tasks" class="row g-2 mb-4 align-items-center bg-white p-3 rounded-4 shadow-sm border">
                <div class="col-md-4">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" name="search" class="form-control border-0 bg-light" placeholder="Buscar tarea..." th:value="${currentSearch}" onkeyup="if(event.keyCode === 13) this.form.submit()">
                    </div>
                </div>
                <div class="col-md-3">
                    <select name="status" class="form-select form-select-sm border-0 bg-light" onchange="this.form.submit()">
                        <option value="">Todas las tareas</option>
                        <option value="pending" th:selected="${currentStatus == 'pending'}">Solo Pendientes</option>
                        <option value="completed" th:selected="${currentStatus == 'completed'}">Completadas</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select name="category" class="form-select form-select-sm border-0 bg-light" onchange="this.form.submit()">
                        <option value="">Categorías</option>
                        <option value="Trabajo" th:selected="${currentCategory == 'Trabajo'}">Trabajo</option>
                        <option value="Clase" th:selected="${currentCategory == 'Clase'}">Clase</option>
                        <option value="Ocio" th:selected="${currentCategory == 'Ocio'}">Ocio</option>
                        <option value="Hogar" th:selected="${currentCategory == 'Hogar'}">Hogar</option>
                        <option value="Importante" th:selected="${currentCategory == 'Importante'}">Importante</option>
                    </select>
                </div>
                <div class="col-md-2 text-end">
                    <a th:href="@{/tasks}" class="btn btn-sm btn-outline-secondary w-100 rounded-pill">Limpiar</a>
                </div>
            </form>

            <div class="d-flex flex-column gap-3" id="taskList">
                <div th:each="task : ${tasks}" th:data-id="${task.id}" class="task-card p-3 d-flex justify-content-between align-items-center shadow-sm grab-cursor"
                     th:classappend="${task.completed ? 'task-done' : (task.overdue ? 'overdue-task' : (task.dueSoon ? 'soon-task' : ''))}">

                    <div class="d-flex align-items-center gap-3 overflow-hidden">
                        <form th:action="@{/tasks/{id}/toggle(id=${task.id})}" method="post" class="m-0">
                            <button type="submit" class="btn btn-link p-0 text-decoration-none">
                                <i class="bi fs-3" th:classappend="${task.completed} ? 'bi-check-circle-fill text-success' : 'bi-circle text-secondary'"></i>
                            </button>
                        </form>

                        <div>
                            <div class="d-flex align-items-center gap-2 mb-1">
                                <h6 class="mb-0 fw-bold task-title text-truncate" th:text="${task.title}">Título</h6>
                                <span th:if="${task.category == 'Trabajo'}" class="badge bg-primary rounded-pill small">Trabajo</span>
                                <span th:if="${task.category == 'Clase'}" class="badge bg-info text-dark rounded-pill small">Clase</span>
                                <span th:if="${task.category == 'Ocio'}" class="badge bg-success rounded-pill small">Ocio</span>
                                <span th:if="${task.category == 'Hogar'}" class="badge bg-warning text-dark rounded-pill small">Hogar</span>
                                <span th:if="${task.category == 'Importante'}" class="badge bg-danger rounded-pill small">Importante</span>
                            </div>
                            <small class="text-muted d-block text-truncate task-desc" th:if="${task.description}" th:text="${task.description}"></small>

                            <div class="task-date mt-1 d-flex gap-3">
                                <span><i class="bi bi-calendar-plus"></i> Creada: <span th:text="${#temporals.format(task.createdAt, 'dd/MM/yyyy')}"></span></span>

                                <span th:if="${task.dueDate}" th:classappend="${!task.completed and task.overdue} ? 'text-danger fw-bold' : (${!task.completed and task.dueSoon} ? 'text-warning fw-bold' : '')">
                                    <i class="bi bi-flag-fill"></i> Límite: <span th:text="${#temporals.format(task.dueDate, 'dd/MM/yyyy')}"></span>
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 ms-3">
                        <button type="button" class="btn btn-light btn-sm" style="color: #6366f1;"
                                data-bs-toggle="modal" data-bs-target="#editModal"
                                th:data-id="${task.id}" th:data-title="${task.title}" th:data-desc="${task.description}" th:data-cat="${task.category}" th:data-due="${task.dueDate}">
                            <i class="bi bi-pencil-fill"></i>
                        </button>

                        <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" class="m-0">
                            <button type="submit" class="btn btn-light btn-sm text-danger" onclick="return confirm('¿Borrar tarea?');">
                                <i class="bi bi-trash-fill"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content card-auth">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Editar Tarea</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="editForm" method="post" th:action="@{/tasks}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Título</label>
                        <input type="text" class="form-control-modern w-100 bg-white" id="editTitle" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Descripción</label>
                        <textarea class="form-control-modern w-100 bg-white" id="editDesc" name="description" rows="2"></textarea>
                    </div>
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label small fw-bold text-muted">Etiqueta</label>
                            <select class="form-control-modern w-100 bg-white" id="editCat" name="category">
                                <option value="">Sin etiqueta</option>
                                <option value="Trabajo">Trabajo</option>
                                <option value="Clase">Clase</option>
                                <option value="Ocio">Ocio</option>
                                <option value="Hogar">Hogar</option>
                                <option value="Importante">Importante</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold text-muted">Fecha Límite</label>
                            <input type="date" class="form-control-modern w-100 bg-white" id="editDue" name="dueDate">
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0 mt-3">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-vibrant rounded-pill px-4">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const themeToggle = document.getElementById('themeToggle');
    const htmlElement = document.documentElement;

    // Cargar preferencia guardada
    if(localStorage.getItem('theme') === 'dark') {
        htmlElement.setAttribute('data-theme', 'dark');
        themeToggle.innerHTML = '<i class="bi bi-sun-fill text-warning"></i>';
    }

    themeToggle.addEventListener('click', () => {
        if(htmlElement.getAttribute('data-theme') === 'dark') {
            htmlElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            themeToggle.innerHTML = '<i class="bi bi-moon-stars-fill"></i>';
        } else {
            htmlElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            themeToggle.innerHTML = '<i class="bi bi-sun-fill text-warning"></i>';
        }
    });
</script>

<script>
    const editModal = document.getElementById('editModal');
    editModal.addEventListener('show.bs.modal', event => {
        const button = event.relatedTarget;
        document.getElementById('editForm').action = '/tasks/' + button.getAttribute('data-id') + '/edit';
        document.getElementById('editTitle').value = button.getAttribute('data-title');
        document.getElementById('editDesc').value = button.getAttribute('data-desc') || '';
        document.getElementById('editCat').value = button.getAttribute('data-cat') || '';
        document.getElementById('editDue').value = button.getAttribute('data-due') || '';
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script>
    const csrfToken = document.querySelector("meta[name='_csrf']").getAttribute("content");
    const csrfHeader = document.querySelector("meta[name='_csrf_header']").getAttribute("content");
    const taskList = document.getElementById('taskList');

    if(taskList) {
        new Sortable(taskList, {
            animation: 150,
            ghostClass: 'bg-light',
            onEnd: function () {
                const order = [];
                taskList.querySelectorAll('.task-card').forEach(card => order.push(card.getAttribute('data-id')));
                fetch('/tasks/reorder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken },
                    body: JSON.stringify(order)
                });
            }
        });
    }
</script>
</body>
</html>
