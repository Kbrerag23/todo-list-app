<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mis Tareas | ToDo Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>

        .task-done .task-title {
            text-decoration: line-through;
            color: #94a3b8;
        }
        .task-done .task-desc {
            text-decoration: line-through;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm mb-5 py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/" style="color: #6366f1;">
            <i class="bi bi-check2-square"></i> ToDo Pro
        </a>
        <div class="d-flex align-items-center">
            <span class="text-muted me-4 fw-medium">
                <i class="bi bi-person-circle" style="color: #a855f7;"></i>
                <span th:text="${#authentication.name}">usuario</span>
            </span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold">Salir</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-9">

            <div class="card card-auth mb-5 p-2">
                <div class="card-body">
                    <form th:action="@{/tasks}" th:object="${newTask}" method="post" class="row g-3 align-items-center">
                        <div class="col-md-5">
                            <input type="text" th:field="*{title}" class="form-control-modern w-100 bg-white" placeholder="¿Qué necesitas hacer hoy?" required>
                        </div>
                        <div class="col-md-5">
                            <input type="text" th:field="*{description}" class="form-control-modern w-100 bg-white" placeholder="Añade detalles (opcional)...">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-vibrant w-100 h-100">Añadir</button>
                        </div>
                    </form>
                </div>
            </div>

            <h4 class="mb-4 fw-bold" style="color: var(--text-main);">Tus Tareas</h4>

            <div th:if="${#lists.isEmpty(tasks)}" class="text-center p-5 bg-white shadow-sm border" style="border-radius: 20px;">
                <i class="bi bi-inbox fs-1" style="color: #cbd5e1;"></i>
                <p class="mt-3 text-muted fw-medium">Todo al día. No tienes tareas pendientes.</p>
            </div>

            <div class="d-flex flex-column gap-3" id="taskList">
                <div th:each="task : ${tasks}" th:data-id="${task.id}" class="task-card p-3 d-flex justify-content-between align-items-center shadow-sm grab-cursor" th:classappend="${task.completed} ? 'task-done' : ''">
                    <div class="d-flex align-items-center gap-3 overflow-hidden">

                        <form th:action="@{/tasks/{id}/toggle(id=${task.id})}" method="post" class="m-0">
                            <button type="submit" class="btn btn-link p-0 text-decoration-none">
                                <i class="bi fs-3" th:classappend="${task.completed} ? 'bi-check-circle-fill text-success' : 'bi-circle text-secondary'"></i>
                            </button>
                        </form>

                        <div>
                            <h6 class="mb-0 fw-bold task-title text-truncate" th:text="${task.title}">Título de la tarea</h6>
                            <small class="text-muted d-block text-truncate task-desc" th:if="${task.description}" th:text="${task.description}">Descripción detallada</small>
                        </div>
                    </div>

                    <div class="d-flex gap-2 ms-3">
                        <button type="button" class="btn btn-light btn-sm" style="color: #6366f1;"
                                data-bs-toggle="modal" data-bs-target="#editModal"
                                th:data-id="${task.id}" th:data-title="${task.title}" th:data-desc="${task.description}">
                            <i class="bi bi-pencil-fill"></i>
                        </button>

                        <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" class="m-0">
                            <button type="submit" class="btn btn-light btn-sm text-danger" onclick="return confirm('¿Borrar tarea definitivamente?');">
                                <i class="bi bi-trash-fill"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content card-auth"> <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-bold">Editar Tarea</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

            <form id="editForm" method="post" th:action="@{/tasks}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Título</label>
                        <input type="text" class="form-control-modern w-100 bg-white" id="editTitle" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Descripción</label>
                        <textarea class="form-control-modern w-100 bg-white" id="editDesc" name="description" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-vibrant rounded-pill px-4">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const editModal = document.getElementById('editModal');
    editModal.addEventListener('show.bs.modal', event => {
        const button = event.relatedTarget;
        const id = button.getAttribute('data-id');
        const title = button.getAttribute('data-title');
        const desc = button.getAttribute('data-desc');


        document.getElementById('editForm').action = '/tasks/' + id + '/edit';
        document.getElementById('editTitle').value = title;
        document.getElementById('editDesc').value = desc || '';
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<script>

    const csrfToken = document.querySelector("meta[name='_csrf']").getAttribute("content");
    const csrfHeader = document.querySelector("meta[name='_csrf_header']").getAttribute("content");


    const taskList = document.getElementById('taskList');

    if(taskList) {
        new Sortable(taskList, {
            animation: 150,
            ghostClass: 'bg-light',
            delay: 150,
            delayOnTouchOnly: true,


            onEnd: function () {

                const order = [];
                taskList.querySelectorAll('.task-card').forEach(card => {
                    order.push(card.getAttribute('data-id'));
                });


                fetch('/tasks/reorder', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify(order)
                }).then(response => {
                    if(!response.ok) console.error("Error al guardar el orden");
                });
            }
        });
    }
</script>

</body>
</html>
