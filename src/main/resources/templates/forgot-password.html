<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | ToDo Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-vibrant d-flex align-items-center min-vh-100 py-5">

<div id="globalLoader" class="loader-overlay">
    <div class="spinner"></div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
            <div class="card card-auth p-4 p-sm-5 shadow-lg">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark">Recuperar acceso</h3>
                    <p class="text-muted small">Te enviaremos un enlace mágico a tu correo</p>
                </div>

                <div th:if="${message}" class="alert alert-success py-2 small text-center" th:text="${message}"></div>

                <form th:action="@{/forgot-password}" method="post">
                    <div class="mb-4">
                        <input type="email" name="email" class="form-control-modern w-100 bg-white" required placeholder="tu@email.com">
                    </div>
                    <button type="submit" class="btn btn-vibrant w-100 mb-3">Enviar enlace</button>
                </form>
            </div>
            <div class="text-center mt-4">
                <a th:href="@{/login}" class="text-white-50 text-decoration-none small"><i class="bi bi-arrow-left"></i> Volver al Login</a>
            </div>
        </div>
    </div>
</div>

<script>
    window.addEventListener('beforeunload', () => {
        document.getElementById('globalLoader').classList.add('active');
    });
</script>

</body>
</html>
