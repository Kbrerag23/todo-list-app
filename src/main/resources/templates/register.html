<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Crear Cuenta | ToDo Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-vibrant d-flex align-items-center min-vh-100 py-5">

<div id="globalLoader" class="loader-overlay">
    <div class="spinner"></div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
            <div class="card card-auth p-4 p-sm-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold" style="color: var(--text-main);">Crea tu cuenta</h2>
                    <p class="text-muted">Empieza a organizarte hoy mismo</p>
                </div>

                <div th:if="${error}" class="alert alert-danger py-2 small text-center" th:text="${error}"></div>

                <form th:action="@{/register}" method="post" id="regForm">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Nombre de usuario</label>
                        <input type="text" name="username" class="form-control-modern w-100" required placeholder="ej: adria_dev">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Correo electrónico</label>
                        <input type="email" name="email" class="form-control-modern w-100" required placeholder="tu@email.com">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Contraseña</label>
                        <input type="password" id="pass" name="password" class="form-control-modern w-100" required>
                        <div class="progress mt-2" style="height: 5px;">
                            <div id="strengthBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                        </div>
                        <small id="strengthText" class="text-muted" style="font-size: 0.75rem;">Seguridad: Muy débil</small>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold">Confirmar contraseña</label>
                        <input type="password" id="confirmPass" name="confirmPassword" class="form-control-modern w-100" required>
                        <div id="matchError" class="text-danger small mt-1 d-none">Las contraseñas no coinciden</div>
                    </div>

                    <button type="submit" id="btnReg" class="btn btn-vibrant w-100" disabled>Crear cuenta</button>
                </form>

                <script>
                    const pass = document.getElementById('pass');
                    const confirm = document.getElementById('confirmPass');
                    const bar = document.getElementById('strengthBar');
                    const text = document.getElementById('strengthText');
                    const btn = document.getElementById('btnReg');

                    pass.addEventListener('input', () => {
                        let score = 0;
                        if (pass.value.length > 7) score++;
                        if (/[A-Z]/.test(pass.value)) score++;
                        if (/[0-9]/.test(pass.value)) score++;
                        if (/[^A-Za-z0-9]/.test(pass.value)) score++;

                        const colors = ['#dc3545', '#ffc107', '#0dcaf0', '#198754'];
                        const labels = ['Muy débil', 'Débil', 'Media', 'Fuerte'];

                        bar.style.width = (score * 25) + '%';
                        bar.style.backgroundColor = colors[score-1] || colors[0];
                        text.innerText = 'Seguridad: ' + (labels[score-1] || labels[0]);
                        validate();
                    });

                    confirm.addEventListener('input', validate);

                    function validate() {
                        const match = pass.value === confirm.value && pass.value !== "";
                        document.getElementById('matchError').classList.toggle('d-none', match || confirm.value === "");
                        btn.disabled = !(match && pass.value.length >= 6);
                    }
                </script>

                <p class="text-center text-muted small mb-4">Al registrarte, aceptas nuestros términos.</p>

                <div class="text-center border-top pt-3">
                    <a th:href="@{/login}" class="fw-bold text-decoration-none" style="color: #a855f7;">¿Ya tienes cuenta? Entra aquí</a>
                </div>
            </div>
            <div class="text-center mt-4">
                <a href="/" class="text-white-50 text-decoration-none small"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
            </div>
        </div>
    </div>
</div>

<script>
    window.addEventListener('beforeunload', () => {
        document.getElementById('globalLoader').classList.add('active');
    });
</script>

</body>
</html>
