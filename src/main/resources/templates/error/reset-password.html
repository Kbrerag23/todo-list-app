<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña | ToDo Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-vibrant d-flex align-items-center min-vh-100 py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
            <div class="card card-auth p-4 p-sm-5 shadow-lg">

                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark">Nueva Contraseña</h3>
                    <p class="text-muted small">Por favor, elige una contraseña segura</p>
                </div>

                <form th:action="@{/reset-password}" method="post">

                    <input type="hidden" name="token" th:value="${token}">

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">Tu nueva contraseña</label>
                        <input type="password" name="password" class="form-control-modern w-100 bg-white" required placeholder="Mínimo 6 caracteres" minlength="6">
                    </div>

                    <button type="submit" class="btn btn-vibrant w-100 mb-3">Guardar y Entrar</button>
                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
