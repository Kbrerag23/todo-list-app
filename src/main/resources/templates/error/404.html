<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | ToDo Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .error-code {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            line-height: 1;
            /* Usamos nuestro gradiente Vibrant Aura */
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(168, 85, 247, 0.2);
        }
        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="bg-vibrant d-flex align-items-center min-vh-100 py-5">

<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="float-animation mb-4">
                <i class="bi bi-compass text-white-50" style="font-size: 5rem;"></i>
            </div>

            <h1 class="error-code mb-0">404</h1>

            <h2 class="fw-bold text-white mb-3">¡Ups! Te has salido del mapa.</h2>
            <p class="text-white-50 mb-5 fs-5">
                La página que buscas no existe, ha sido movida o simplemente se tomó un descanso.
            </p>

            <a th:href="@{/}" class="btn btn-vibrant btn-lg px-5 py-3 shadow-lg rounded-pill">
                <i class="bi bi-house-door-fill me-2"></i> Volver a lugar seguro
            </a>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
