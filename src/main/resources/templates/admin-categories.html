<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Panel de Administración | Categorías</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light p-3 p-md-5">

<div id="globalLoader" class="loader-overlay">
    <div class="spinner"></div>
</div>

<div class="container">

    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3 mb-4">
        <h2 class="m-0 fs-3"><i class="bi bi-tags text-primary"></i> Gestión de Categorías</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/users}" class="btn btn-outline-primary">Gestión de Usuarios</a>
            <a th:href="@{/tasks}" class="btn btn-outline-secondary">Volver a mis tareas</a>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-4 p-4">
        <form th:action="@{/admin/categories}" method="post" class="d-flex gap-3 align-items-center">
            <input type="color" name="color" class="form-control form-control-color border-0 bg-transparent p-0" value="#6366f1" style="width: 45px; height: 45px; cursor: pointer;" title="Elige un color" required>
            <input type="text" name="name" class="form-control-modern w-100" placeholder="Escribe el nombre de la nueva categoría..." required>
            <button type="submit" class="btn btn-vibrant px-4">Guardar</button>
        </form>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover bg-white mb-0 text-nowrap">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Color y Nombre</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${categories}">
                    <td th:text="${c.id}">1</td>
                    <td class="fw-bold">
                        <span class="badge rounded-pill text-white" th:style="'background-color: ' + ${c.color}" th:text="${c.name}"></span>
                    </td>
                    <td>
                        <form th:action="@{'/admin/categories/' + ${c.id} + '/delete'}" method="post" class="m-0">
                            <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Estás seguro de eliminar esta categoría del sistema?');">
                                <i class="bi bi-trash"></i> Eliminar
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
</script>
<script>
    window.addEventListener('beforeunload', () => {
        document.getElementById('globalLoader').classList.add('active');
    });
</script>
</body>
</html>
