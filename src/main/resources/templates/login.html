<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | ToDo Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-vibrant d-flex align-items-center min-vh-100 py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
            <div class="card card-auth p-4 p-sm-5 shadow-lg">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark">Bienvenido de nuevo</h3>
                    <p class="text-muted small">Accede a tus tareas</p>
                </div>

                <form th:action="@{/login}" method="post">
                    <div th:if="${param.error}" class="alert alert-danger py-2 small text-center">
                        Usuario, correo o contraseña incorrectos.
                    </div>

                    <div th:if="${param.logout}" class="alert alert-info py-2 small text-center">
                        Has cerrado sesión correctamente.
                    </div>

                    <div th:if="${param.success}" class="alert alert-success py-2 small text-center">
                        ¡Cuenta creada con éxito! Ya puedes iniciar sesión.
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Usuario o Correo</label>
                        <input type="text" name="username" class="form-control-modern w-100 bg-white" placeholder="ej: adria_dev o tu@email.com" required autofocus>
                    </div>

                    <div class="mb-2">
                        <label class="form-label small fw-bold text-muted">Contraseña</label>
                        <input type="password" name="password" class="form-control-modern w-100 bg-white" placeholder="Tu contraseña" required>
                    </div>

                    <div class="text-end mb-4">
                        <a th:href="@{/forgot-password}" class="text-muted small text-decoration-none">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn btn-vibrant w-100 mb-3">Iniciar Sesión</button>
                </form>

                <div class="text-center mt-3">
                    <span class="text-muted small">¿No tienes cuenta?</span>
                    <a th:href="@{/register}" class="text-primary small fw-bold text-decoration-none">Regístrate aquí</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
