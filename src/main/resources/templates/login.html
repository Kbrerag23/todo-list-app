<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Entrar | ToDo Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-vibrant d-flex align-items-center min-vh-100 py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
            <div class="card card-auth p-4 p-sm-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold" style="color: var(--text-main);">¡Hola de nuevo!</h2>
                    <p class="text-muted">Ingresa a tu panel de control</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger py-2 small">Credenciales incorrectas</div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Email</label>
                        <input type="email" name="username" class="form-control-modern w-100 bg-white" required autofocus placeholder="tu@email.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">Contraseña</label>
                        <input type="password" name="password" class="form-control-modern w-100 bg-white" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-vibrant w-100 mb-3">Iniciar Sesión</button>
                </form>

                <div class="text-center border-top pt-3">
                    <span class="text-muted small">¿No tienes cuenta?</span>
                    <a th:href="@{/register}" class="fw-bold text-decoration-none ms-1" style="color: #a855f7;">Regístrate</a>
                </div>
            </div>
            <div class="text-center mt-4">
                <a href="/" class="text-white-50 text-decoration-none small"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
