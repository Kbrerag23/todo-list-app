<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo Pro - Organiza tu vida</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            line-height: 1.2;
            letter-spacing: -1px;
        }
        .text-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .feature-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1) !important;
            border-color: #6366f1 !important;
        }
        .icon-box {
            width: 48px;
            height: 48px;
            background-color: rgba(99, 102, 241, 0.1);
            color: #6366f1;
        }
    </style>
</head>
<body>

<div id="globalLoader" class="loader-overlay">
    <div class="spinner"></div>
</div>

<nav class="navbar navbar-expand bg-white shadow-sm fixed-top py-3">
    <div class="container d-flex align-items-center">
        <a class="navbar-brand fw-bold fs-4 m-0 d-flex align-items-center gap-2" href="/" style="color: #6366f1;">
            <i class="bi bi-check2-square"></i> ToDo Pro
        </a>

        <div class="ms-auto d-flex align-items-center gap-2">
            <a th:href="@{/login}" class="btn btn-outline-vibrant fw-bold px-3">
                Iniciar Sesión
            </a>
            <a th:href="@{/register}" class="btn btn-vibrant fw-bold d-none d-md-inline-block px-4">
                Empezar Gratis
            </a>
        </div>
    </div>
</nav>

<section class="min-vh-100 d-flex align-items-center" style="padding-top: 100px;">
    <div class="container pb-5">
        <div class="row justify-content-center text-center">
            <div class="col-lg-10">

                <h1 class="hero-title fw-bold mb-4 text-dark">
                    Organiza tu trabajo y tu vida, <br class="d-none d-md-block">
                    <span class="text-gradient">al instante.</span>
                </h1>

                <p class="lead mb-5 mx-auto text-muted" style="max-width: 600px; font-weight: 400;">
                    Concéntrate en lo que importa. ToDo Pro te ayuda a gestionar tus tareas diarias de forma sencilla, segura y desde cualquier lugar.
                </p>

                <div class="d-flex justify-content-center mb-5">
                    <a th:href="@{/register}" class="btn btn-vibrant btn-lg px-4 px-md-5 py-3 fs-5 shadow-sm">Crear mi cuenta</a>
                </div>

                <div class="row g-4 text-start mt-4">
                    <div class="col-md-4">
                        <div class="bg-white p-4 h-100 rounded-4 border shadow-sm feature-card">
                            <div class="icon-box d-inline-flex align-items-center justify-content-center rounded-3 mb-4">
                                <i class="bi bi-shield-lock fs-4"></i>
                            </div>
                            <h5 class="fw-bold text-dark mb-2">100% Seguro</h5>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="bg-white p-4 h-100 rounded-4 border shadow-sm feature-card">
                            <div class="icon-box d-inline-flex align-items-center justify-content-center rounded-3 mb-4">
                                <i class="bi bi-lightning-charge fs-4"></i>
                            </div>
                            <h5 class="fw-bold text-dark mb-2">Rápido y Dinámico</h5>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="bg-white p-4 h-100 rounded-4 border shadow-sm feature-card">
                            <div class="icon-box d-inline-flex align-items-center justify-content-center rounded-3 mb-4">
                                <i class="bi bi-phone fs-4"></i>
                            </div>
                            <h5 class="fw-bold text-dark mb-2">Diseño Responsive</h5>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    window.addEventListener('beforeunload', () => {
        document.getElementById('globalLoader').classList.add('active');
    });
</script>

<script>
    if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
</script>
</body>
</html>
