<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tareas del Usuario | ToDo Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .task-done .task-title { text-decoration: line-through; color: #94a3b8; }
        .task-done .task-desc { text-decoration: line-through; opacity: 0.7; }
        .task-date { font-size: 0.75rem; color: #94a3b8; }
        .overdue-task { border-left: 5px solid #dc3545 !important; }
        .soon-task { border-left: 5px solid #ffc107 !important; }
    </style>
</head>
<body class="bg-light pb-5">

<div id="globalLoader" class="loader-overlay">
    <div class="spinner"></div>
</div>

<nav class="navbar navbar-expand-lg bg-white shadow-sm mb-5 py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4 d-flex align-items-center gap-2" href="/admin/users" style="color: #6366f1;">
            <i class="bi bi-arrow-left-circle-fill"></i> Volver a Usuarios
        </a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-9">

            <div class="d-flex align-items-center mb-4">
                <i class="bi bi-person-badge fs-1 text-primary me-3"></i>
                <div>
                    <h3 class="mb-0 fw-bold" style="color: var(--text-main);">
                        Tareas de <span class="text-primary" th:text="${targetUser.username}">Usuario</span>
                    </h3>
                    <p class="text-muted mb-0" th:text="${targetUser.email}">correo@email.com</p>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(tasks)}" class="text-center p-5 bg-white shadow-sm border" style="border-radius: 20px;">
                <i class="bi bi-clipboard-x fs-1" style="color: #cbd5e1;"></i>
                <p class="mt-3 text-muted fw-medium">Este usuario no tiene ninguna tarea guardada.</p>
            </div>

            <div class="d-flex flex-column gap-3">
                <div th:each="task : ${tasks}" class="task-card p-3 d-flex justify-content-between align-items-center shadow-sm"
                     th:classappend="${task.completed ? 'task-done' : (task.overdue ? 'overdue-task' : (task.dueSoon ? 'soon-task' : ''))}">

                    <div class="d-flex align-items-start gap-3 overflow-hidden w-100">
                        <i class="bi fs-3 mt-1" th:classappend="${task.completed} ? 'bi-check-circle-fill text-success' : 'bi-circle text-secondary'"></i>

                        <div class="w-100">
                            <div class="d-flex align-items-center flex-wrap gap-2 mb-1">
                                <h6 class="mb-0 fw-bold task-title text-truncate" style="max-width: 100%;" th:text="${task.title}">Título</h6>
                                <span th:if="${task.category == 'Trabajo'}" class="badge bg-primary rounded-pill small">Trabajo</span>
                                <span th:if="${task.category == 'Clase'}" class="badge bg-info text-dark rounded-pill small">Clase</span>
                                <span th:if="${task.category == 'Ocio'}" class="badge bg-success rounded-pill small">Ocio</span>
                                <span th:if="${task.category == 'Hogar'}" class="badge bg-warning text-dark rounded-pill small">Hogar</span>
                                <span th:if="${task.category == 'Importante'}" class="badge bg-danger rounded-pill small">Importante</span>
                                <span th:if="${task.category != null and task.category != 'Trabajo' and task.category != 'Clase' and task.category != 'Ocio' and task.category != 'Hogar' and task.category != 'Importante' and task.category != ''}"
                                      class="badge rounded-pill small text-white"
                                      th:style="'background-color: ' + (${categoryColors != null and categoryColors.containsKey(task.category)} ? ${categoryColors.get(task.category)} : '#6c757d')"
                                      th:text="${task.category}">Custom</span>
                            </div>

                            <small class="text-muted d-block task-desc mb-2" th:if="${task.description}" th:text="${task.description}">Descripción</small>

                            <div th:if="${task.tags != null and !task.tags.isEmpty()}" class="mb-2 d-flex flex-wrap gap-1">
                                <span th:each="tag : ${#strings.arraySplit(task.tags, ',')}" class="badge border text-muted fw-normal" style="background-color: var(--bg-input);" th:text="${'#' + #strings.trim(tag)}"></span>
                            </div>

                            <div class="task-date mt-2 d-flex flex-wrap gap-3">
                                <span><i class="bi bi-calendar-plus"></i> Creada: <span th:text="${#temporals.format(task.createdAt, 'dd/MM/yyyy')}"></span></span>

                                <span th:if="${task.dueDate}" th:classappend="${!task.completed and task.overdue} ? 'text-danger fw-bold' : (${!task.completed and task.dueSoon} ? 'text-warning fw-bold' : '')">
                                    <i class="bi bi-flag-fill"></i> Límite: <span th:text="${#temporals.format(task.dueDate, 'dd/MM/yyyy')}"></span>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
</script>
<script>
    window.addEventListener('beforeunload', () => {
        document.getElementById('globalLoader').classList.add('active');
    });
</script>
</body>
</html>
