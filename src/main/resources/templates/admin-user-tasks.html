<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tareas del Usuario | ToDo Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .task-done .task-title { text-decoration: line-through; color: #94a3b8; }
        .task-done .task-desc { text-decoration: line-through; opacity: 0.7; }
    </style>
</head>
<body class="bg-light pb-5">

<nav class="navbar navbar-expand-lg bg-white shadow-sm mb-5 py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/admin/users" style="color: #6366f1;">
            <i class="bi bi-arrow-left-circle-fill me-2"></i> Volver a Usuarios
        </a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-9">

            <div class="d-flex align-items-center mb-4">
                <i class="bi bi-person-badge fs-1 text-primary me-3"></i>
                <div>
                    <h3 class="mb-0 fw-bold" style="color: var(--text-main);">
                        Tareas de <span class="text-primary" th:text="${targetUser.username}">Usuario</span>
                    </h3>
                    <p class="text-muted mb-0" th:text="${targetUser.email}">correo@email.com</p>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(tasks)}" class="text-center p-5 bg-white shadow-sm border" style="border-radius: 20px;">
                <i class="bi bi-clipboard-x fs-1" style="color: #cbd5e1;"></i>
                <p class="mt-3 text-muted fw-medium">Este usuario no tiene ninguna tarea guardada.</p>
            </div>

            <div class="d-flex flex-column gap-3">
                <div th:each="task : ${tasks}" class="task-card p-3 d-flex justify-content-between align-items-center shadow-sm" th:classappend="${task.completed} ? 'task-done' : ''">
                    <div class="d-flex align-items-center gap-3 overflow-hidden">

                        <i class="bi fs-3" th:classappend="${task.completed} ? 'bi-check-circle-fill text-success' : 'bi-circle text-secondary'"></i>

                        <div>
                            <h6 class="mb-0 fw-bold task-title text-truncate" th:text="${task.title}">Título</h6>
                            <small class="text-muted d-block text-truncate task-desc" th:if="${task.description}" th:text="${task.description}">Descripción</small>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
