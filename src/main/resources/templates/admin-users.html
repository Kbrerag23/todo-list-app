<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Panel de Administración | Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Panel de Administrador - Usuarios</h2>
        <a th:href="@{/tasks}" class="btn btn-outline-secondary">Volver a mis tareas</a>
    </div>

    <table class="table table-hover bg-white shadow-sm rounded">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}">1</td>
            <td th:text="${u.username}">admin</td>
            <td th:text="${u.email}">admin@admin.com</td>
            <td><span class="badge bg-primary" th:text="${u.role}">USER</span></td>
            <td>
                <a th:href="@{'/admin/users/' + ${u.id} + '/tasks'}" class="btn btn-sm btn-success">Ver Tareas</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
