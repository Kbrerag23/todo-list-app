<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Panel de Administración | Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light p-5">
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-shield-lock text-primary"></i> Panel de Administración</h2>
        <a th:href="@{/tasks}" class="btn btn-outline-secondary">Volver a mis tareas</a>
    </div>

    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 bg-primary text-white p-3 text-center">
                <i class="bi bi-people-fill fs-1"></i>
                <h3 class="fw-bold mb-0" th:text="${totalUsers}">0</h3>
                <span>Usuarios Registrados Totales</span>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm border-0 bg-success text-white p-3 text-center">
                <i class="bi bi-graph-up-arrow fs-1"></i>
                <h3 class="fw-bold mb-0" th:text="${tasksToday}">0</h3>
                <span>Tareas Creadas Hoy en toda la App</span>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <table class="table table-hover bg-white mb-0">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${userPage.content}">
                <td th:text="${u.id}">1</td>
                <td class="fw-bold" th:text="${u.username}">admin</td>
                <td th:text="${u.email}">admin@admin.com</td>
                <td><span class="badge" th:classappend="${u.role == 'ADMIN'} ? 'bg-danger' : 'bg-primary'" th:text="${u.role}">USER</span></td>
                <td>
                    <a th:href="@{'/admin/users/' + ${u.id} + '/tasks'}" class="btn btn-sm btn-outline-dark"><i class="bi bi-eye"></i> Ver Tareas</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav class="mt-4" th:if="${userPage.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${userPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(page=${userPage.number - 1})}">Anterior</a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, userPage.totalPages - 1)}" th:classappend="${userPage.number == i} ? 'active'">
                <a class="page-link" th:href="@{/admin/users(page=${i})}" th:text="${i + 1}">1</a>
            </li>

            <li class="page-item" th:classappend="${userPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(page=${userPage.number + 1})}">Siguiente</a>
            </li>
        </ul>
    </nav>

</div>
</body>
</html>
