<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Panel de Administración | Usuarios</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light p-3 p-md-5">

<div id="globalLoader" class="loader-overlay">
    <div class="spinner"></div>
</div>

<div class="container">

    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3 mb-4">
        <h2 class="m-0 fs-3"><i class="bi bi-shield-lock text-primary"></i> Panel de Administración</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/categories}" class="btn btn-outline-primary">Gestión de Categorías</a>
            <a th:href="@{/tasks}" class="btn btn-outline-secondary">Volver a mis tareas</a>
        </div>
    </div>

    <div class="row mb-4 g-3">
        <div class="col-12 col-md-6">
            <div class="card shadow-sm border-0 bg-primary text-white p-3 text-center h-100">
                <i class="bi bi-people-fill fs-1"></i>
                <h3 class="fw-bold mb-0" th:text="${totalUsers}">0</h3>
                <span class="small">Usuarios Registrados Totales</span>
            </div>
        </div>
        <div class="col-12 col-md-6">
            <div class="card shadow-sm border-0 bg-success text-white p-3 text-center h-100">
                <i class="bi bi-graph-up-arrow fs-1"></i>
                <h3 class="fw-bold mb-0" th:text="${tasksToday}">0</h3>
                <span class="small">Tareas Creadas Hoy en toda la App</span>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover bg-white mb-0 text-nowrap">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${userPage.content}">
                    <td th:text="${u.id}">1</td>
                    <td class="fw-bold" th:text="${u.username}">admin</td>
                    <td th:text="${u.email}">admin@admin.com</td>
                    <td><span class="badge" th:classappend="${u.role == 'ADMIN'} ? 'bg-danger' : 'bg-primary'" th:text="${u.role}">USER</span></td>
                    <td>
                        <a th:href="@{'/admin/users/' + ${u.id} + '/tasks'}" class="btn btn-sm btn-outline-dark">
                            <i class="bi bi-eye"></i> Ver Tareas
                        </a>
                        <form th:if="${u.role != 'ADMIN'}" th:action="@{'/admin/users/' + ${u.id} + '/promote'}" method="post" class="d-inline m-0">
                            <button type="submit" class="btn btn-sm btn-outline-primary" onclick="return confirm('¿Otorgar permisos de Administrador a este usuario?');">
                                <i class="bi bi-star-fill"></i> Promover
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-4" th:if="${userPage.totalPages > 1}">
        <ul class="pagination justify-content-center flex-wrap gap-1">
            <li class="page-item" th:classappend="${userPage.first} ? 'disabled'">
                <a class="page-link rounded-2" th:href="@{/admin/users(page=${userPage.number - 1})}">Anterior</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, userPage.totalPages - 1)}" th:classappend="${userPage.number == i} ? 'active'">
                <a class="page-link rounded-2" th:href="@{/admin/users(page=${i})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${userPage.last} ? 'disabled'">
                <a class="page-link rounded-2" th:href="@{/admin/users(page=${userPage.number + 1})}">Siguiente</a>
            </li>
        </ul>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
</script>
<script>
    window.addEventListener('beforeunload', () => {
        document.getElementById('globalLoader').classList.add('active');
    });
</script>
</body>
</html>
